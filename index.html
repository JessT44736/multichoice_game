<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Keyword Match Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="game-container">
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <h1>Term Matcher</h1>

    <div id="category-buttons" class="category-buttons"></div>

    <div id="game-box">
        <p id="definition-text">Loading...</p>
        <!-- Buttons will be generated here by JavaScript -->
        <div id="choices-container"></div>
        <p id="feedback"></p>
        <p id="score-board">Score: 0</p>
        <button id="next-game-btn" class="next-game-btn" style="display:none;">Next Game</button>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
